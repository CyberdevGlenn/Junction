<!DOCTYPE html>
<html>
<head>
<base target="_blank">
<link rel="stylesheet" href="../../css/style.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tunnel Rush | Junction</title>
<script id="gamedistribution-jssdk" src=""></script>
<script src="https://cdn.jsdelivr.net/gh/hyperwood/h4tfgh7@c4d52c61c545cc2d537d647ee6a882856d9baf34/UnityProgress.js"></script>
<script src="https://cdn.jsdelivr.net/gh/hyperwood/h4tfgh7@c4d52c61c545cc2d537d647ee6a882856d9baf34/unityloader49.js"></script>
<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  width: 100%;
}

body {
  display: flex;
  flex-direction: column;
  background: #000;
}

header {
  flex-shrink: 0;
  z-index: 100;
}

.game-wrapper {
  flex: 1;
  overflow: hidden;
  position: relative;
}

.webgl-content {
  width: 100%;
  height: 100%;
  margin: 0px;
  padding: 0px;
  border: 0px;
}

#gameContainer {
  width: 100%;
  height: 100%;
  margin: 0px;
  padding: 0px;
  border: 0px;
  position: relative;
  background: rgb(128, 128, 128);
}

#gameContainer canvas {
  display: block;
  width: 100% !important;
  height: 100% !important;
}

button#run_game {
  min-width: 100%;
  font-family: inherit;
  appearance: none;
  border: 0;
  border-radius: 5px;
  background: #2c2c2c;
  color: #fff;
  padding: 18px 46px;
  font-size: 28px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  width: 100%;
  margin: 0;
}

button#run_game:hover {
  background: #3f3f3f;
}

button#run_game:focus {
  outline: none;
  box-shadow: 0 0 0 4px #cbd6ee;
}

.logo.Dark {
  display: none !important;
}

.progress.Dark {
  display: none !important;
}
</style>
</head>
<body>

<header>
    <div class="logo">Junction</div>
    <nav>
        <a href="../../index.html">Home</a>
        <a href="../../pages/games.html">Back to Games</a>
        <button class="dark-mode-toggle" aria-label="Toggle dark mode"></button>
    </nav>
</header>

<div class="game-wrapper">
  <div class="webgl-content">
    <div id="gameContainer" style="width: 100%; height: 100%; margin: 0px; padding: 0px; border: 0px; position: relative; background: rgb(128, 128, 128);">
      <canvas id="#canvas" width="760" height="624" style="cursor: default;"></canvas>
      <div class="logo Dark" style="display: none;"></div>
      <div class="progress Dark" style="display: none;">
        <div class="empty" style="width: 0%;"></div>
        <div class="full" style="width: 100%;"></div>
      </div>
    </div>
  </div>
</div>

<script type="text/javascript">
  var gameInstance;
  window.onload = function () {
    let bttn = document.createElement("button");
    bttn.appendChild(document.createTextNode("CLICK TO PLAY NOW"));
    bttn.setAttribute('id', 'run_game');
    bttn.style.display = 'none';
    bttn.style.position = 'absolute';
    document.body.appendChild(bttn);
    bttn.style.display = 'block';
    bttn.style.left = ((document.body.clientWidth - bttn.offsetWidth)/2) + 'px';
    bttn.style.top = ((document.body.clientHeight - bttn.offsetHeight)/2) + 'px';
    bttn.onclick = function () {
      gameInstance = UnityLoader.instantiate("gameContainer", "https://cdn.jsdelivr.net/gh/hyperwood/h4tfgh7@c4d52c61c545cc2d537d647ee6a882856d9baf34/tunnel-rush_v9.json", {onProgress: UnityProgress, Module:{onRuntimeInitialized: function() {UnityProgress(gameInstance, "complete")}}});
      this.remove();
    }
  }
</script>

<script src="../../js/app.js"></script>
</body>
</html>
