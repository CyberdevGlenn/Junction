<!DOCTYPE html>
<html>
<head>
<base target="_blank">
<link rel="stylesheet" href="../../css/style.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tunnel Rush | Junction</title>
<script id="gamedistribution-jssdk" src=""></script>
<script src="https://cdn.jsdelivr.net/gh/hyperwood/h4tfgh7@c4d52c61c545cc2d537d647ee6a882856d9baf34/UnityProgress.js"></script>
<script src="https://cdn.jsdelivr.net/gh/hyperwood/h4tfgh7@c4d52c61c545cc2d537d647ee6a882856d9baf34/unityloader49.js"></script>
<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  width: 100%;
}

body {
  display: flex;
  flex-direction: column;
  background: #000;
}

header {
  flex-shrink: 0;
  z-index: 100;
}

.game-wrapper {
  flex: 1;
  overflow: hidden;
  position: relative;
}

.webgl-content {
  width: 100%;
  height: 100%;
  margin: 0px;
  padding: 0px;
  border: 0px;
}

#gameContainer {
  width: 100%;
  height: 100%;
  margin: 0px;
  padding: 0px;
  border: 0px;
  position: relative;
  background: rgb(128, 128, 128);
}

#gameContainer canvas {
  display: block;
  width: 100% !important;
  height: 100% !important;
}

.logo.Dark {
  display: none !important;
}

.progress.Dark {
  display: none !important;
}
  /* Loading Screen */
#loadingScreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999999;
}

.loader-content {
  text-align: center;
  color: white;
  font-family: Arial, sans-serif;
}

.loader-content h1 {
  margin-bottom: 20px;
}

.loader-bar-container {
  width: 300px;
  height: 20px;
  background: #222;
  border-radius: 10px;
  overflow: hidden;
}

#loaderBar {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg,#00ffff,#ff00ff);
  transition: width .15s ease;
}

#loaderText {
  margin-top: 10px;
  font-size: 16px;
}
</style>
</head>
<body>
<div id="loadingScreen">
  <div class="loader-content">
    <h1>Tunnel Rush</h1>

    <div class="loader-bar-container">
      <div id="loaderBar"></div>
    </div>

    <div id="loaderText">Loading... 0%</div>
  </div>
</div>
<header>
    <div class="logo">Junction</div>
    <nav>
        <a href="../../index.html">Home</a>
        <a href="../../pages/games.html">Back to Games</a>
        <button class="dark-mode-toggle" aria-label="Toggle dark mode"></button>
    </nav>
</header>

<div class="game-wrapper">
  <div class="webgl-content">
    <div id="gameContainer" style="width: 100%; height: 100%; margin: 0px; padding: 0px; border: 0px; position: relative; background: rgb(128, 128, 128);">
      <canvas id="#canvas" width="760" height="624" style="cursor: default;"></canvas>
      <div class="logo Dark" style="display: none;"></div>
      <div class="progress Dark" style="display: none;">
        <div class="empty" style="width: 0%;"></div>
        <div class="full" style="width: 100%;"></div>
      </div>
    </div>
  </div>
</div>

<script type="text/javascript">
  var gameInstance;
  window.onload = function () {
    gameInstance = UnityLoader.instantiate("gameContainer", "https://cdn.jsdelivr.net/gh/hyperwood/h4tfgh7@c4d52c61c545cc2d537d647ee6a882856d9baf34/tunnel-rush_v9.json", {onProgress: UnityProgress});
  }
</script>

<script src="../../js/app.js"></script>
</body>
</html>
