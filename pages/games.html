<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Games | Junction</title>
<link rel="stylesheet" href="../css/style.css">
<style>
    main.games-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 40px 20px;
    }

    .game-category {
        margin-bottom: 50px;
    }

    .game-category h2 {
        font-size: 1.8rem;
        font-weight: 600;
        margin-bottom: 20px;
        color: #fff;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .game-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 15px;
    }

    .game-btn {
        background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        border: 2px solid rgba(37, 99, 235, 0.5);
        border-radius: 12px;
        padding: 20px 15px;
        text-align: center;
        text-decoration: none;
        color: #fff;
        transition: all 0.3s ease;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100px;
    }

    .game-btn:hover {
        background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
        border-color: #2563eb;
        transform: translateY(-5px);
        box-shadow: 0 10px 30px rgba(37, 99, 235, 0.4);
    }

    .game-btn:active {
        transform: translateY(-2px);
    }

    .embedded-container {
        width: 100%;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .embedded-container iframe {
        width: 100%;
        border: none;
        display: block;
    }
</style>
</head>
<body>

<header>
    <div class="logo">Junction</div>
    <nav>
        <a href="../index.html">Home</a>
        <button class="dark-mode-toggle" aria-label="Toggle dark mode"></button>
    </nav>
</header>

<main class="hero">
    <h1>Games</h1>
    <p>Play a variety of games, organized by category.</p>
</main>

<main class="games-container">

    <!-- Casual Arcade Category -->
    <div class="game-category">
        <h2>🎮 Casual Arcade</h2>
        <div class="game-grid">
            <a href="../games/casual-arcade/fishingio.html" class="game-btn">Fishing.io</a>
            <a href="../games/casual-arcade/paperio.html" class="game-btn">Paper.io</a>
        </div>
    </div>

    <!-- Endless Runner Category -->
    <div class="game-category">
        <h2>🏃 Endless Runner</h2>
        <div class="game-grid">
            <a href="../games/endless-runner/slope2.html" class="game-btn">Slope 2</a>
            <a href="../games/endless-runner/subwaysurfers.html" class="game-btn">Subway Surfers</a>
            <a href="../games/endless-runner/tunnel-rush.html" class="game-btn">Tunnel Rush</a>
        </div>
    </div>

    <!-- Driving Category -->
    <div class="game-category">
        <h2>🏎️ Driving</h2>
        <div class="game-grid">
            <a href="../games/driving/slowroads.html" class="game-btn">Slow Roads</a>
        </div>
    </div>
    <!-- Sports Category -->
    <div class="game-category">
        <h2>⚽ Sports</h2>
        <div class="game-grid">
            <a href="../games/sports/basket-bros.html" class="game-btn">Basket Bros</a>
        </div>
    </div>

</main>
<script src="js/app.js"></script>
</body>
</html>
